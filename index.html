<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Calcs">
    
<input type="text" id="Calc" disabled><br>
        <div class="buttons">
            <button onclick = "deleteLast()">D</button>
            <button onclick = "format()">C</button><br>
            <button onclick = "Grey('9')">9</button>
            <button onclick = "Grey('8')">8</button>
            <button onclick = "Grey('7')">7</button>
            <button onclick = "Grey('/')">÷</button><br>
            <button onclick = "Grey('6')">6</button>
            <button onclick = "Grey('5')">5</button>
            <button onclick = "Grey('4')">4</button>
            <button onclick = "Grey('*')">×</button><br>
            <button onclick = "Grey('3')">3</button>
            <button onclick = "Grey('2')">2</button>
            <button onclick = "Grey('1')">1</button>
            <button onclick = "Grey('-')">-</button><br>
            <button onclick = "Grey('0')">0</button>
            <button onclick = "Grey('.')">.</button>
            <button onclick = "calculations()">=</button>
            <button onclick = "Grey('+')">+</button><br>
            <button onclick = "Grey('√')">√</button>
            <button onclick = "Grey('(')">(</button>
            <button onclick = "Grey(')')">)</button>
            <button onclick = "Grey('^')">^</button><br>
        </div>
    </div>

    <script> 
        function Grey(num)
    {
        const  Greyyy = document.getElementById('Calc');
        Greyyy.value += num;
    }

    function format(){document.getElementById('Calc').value = '';
    }

    function deleteLast()
    {
        const variabo = document.getElementById('Calc');
        variabo.value = variabo.value.slice(0, -1);
    }
    
    function calculations()
    { 
        const variabo = document.getElementById('Calc');
        let expression = variabo.value;
    
        try {
            variabo.value = eval(expression);
        }
        catch (error) {
            variabo.value = 'Error';
        }
    }
    </script>

</body>
</html>
